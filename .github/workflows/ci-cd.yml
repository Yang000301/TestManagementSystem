name: CI - Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore TestManagementSystem.API/TestManagementSystem.API/TestManagementSystem.API.csproj

      - name: Build
        run: dotnet build TestManagementSystem.API/TestManagementSystem.API/TestManagementSystem.API.csproj --no-restore
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./tms-frontend
        run: npm install

      - name: Build
        working-directory: ./tms-frontend
        run: npm run build