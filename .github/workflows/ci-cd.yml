name: CI - Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore TestManagementSystem.API/TestManagementSystem.API/TestManagementSystem.API.csproj

      - name: Build
        run: dotnet build TestManagementSystem.API/TestManagementSystem.API/TestManagementSystem.API.csproj --no-restore

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./tms-frontend
        run: npm install

      - name: Build
        working-directory: ./tms-frontend
        run: npm run build

  build-and-push-docker:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./TestManagementSystem.API/TestManagementSystem.API
          file: ./TestManagementSystem.API/TestManagementSystem.API/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/testmanagementsystem-api:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./tms-frontend
          file: ./tms-frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/testmanagementsystem-frontend:latest